<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>중1 영어 듣기평가 학습 가이드</title>
    <style>
        /* 기본 스타일 초기화 및 폰트 설정 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
            padding-bottom: 40px;
        }

        /* 상단 헤더 디자인 */
        header {
            background-color: #4a90e2;
            color: white;
            text-align: center;
            padding: 20px 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* 메인 콘텐츠 컨테이너 (모바일 좌우 여백 지정) */
        main {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 15px;
        }

        /* 회차별 카드 스타일 */
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .card h2 {
            font-size: 1.15rem;
            color: #2c3e50;
            margin-bottom: 15px;
            border-left: 4px solid #4a90e2;
            padding-left: 10px;
        }

        /* 버튼 그룹 (모바일에서 누르기 편하게 배치) */
        .btn-group {
            display: flex;
            flex-direction: column;
            /* 모바일에서는 세로로 버튼 배치 */
            gap: 10px;
        }

        /* 공통 버튼 디자인 */
        .btn {
            display: block;
            text-align: center;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.95rem;
            transition: background 0.2s;
        }

        /* 버튼 종류별 색상 */
        .btn-audio {
            background-color: #2ecc71;
            color: white;
        }

        /* 음원 듣기: 초록색 */
        .btn-pdf {
            background-color: #34495e;
            color: white;
        }

        /* 문제지: 어두운 회색 */

        /* 태블릿 이상 넓은 화면(600px 이상)일 때 버튼을 가로로 배열 */
        @media (min-width: 600px) {
            .btn-group {
                flex-direction: row;
            }

            .btn {
                flex: 1;
            }
        }

        /* 하단 푸터 */
        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>

<body>

    <header>
        <h1>🎧 중1 영어 듣기평가 가이드</h1>
        <p>EBS 공식 자료를 활용하여 스마트하게 리스닝을 연습하세요.</p>
    </header>

    <main>
        <div class="card">
            <h2>2026년 제1회 전국 영어듣기평가</h2>
            <div class="btn-group">
                <a href="https://www.ebsi.co.kr/ebs/pot/potg/EnglishListening03.ebs?targetCd=PM01" target="_blank"
                    class="btn btn-audio">📢 EBS 공식 음원 들으러 가기</a>
                <a href="https://www.ebsi.co.kr/ebs/pot/potg/EnglishListening03.ebs?targetCd=PM01" target="_blank"
                    class="btn btn-pdf">📄 문제지/대본 확인하기</a>
            </div>
        </div>

        <div class="card">
            <h2>2025년 제2회 전국 영어듣기평가</h2>
            <div class="btn-group">
                <a href="https://mid.ebs.co.kr/english" target="_blank" class="btn btn-audio">📢 EBS 공식 음원 들으러 가기</a>
                <a href="https://mid.ebs.co.kr/english" target="_blank" class="btn btn-pdf">📄 문제지/대본 확인하기</a>
            </div>
        </div>
    </main>

    <footer>
        <p>본 사이트는 학습 안내용 링크만 제공합니다.</p>
        <p>모든 자료의 저작권은 EBS(한국교육방송공사)에 있습니다.</p>
    </footer>

</body>

</html>
